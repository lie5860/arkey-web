name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  host:
    name: Node host (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - if: runner.os == 'Linux'
        run: npm pack --dry-run

  macos-app:
    name: macOS app
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: swift --version
      - run: swift test --package-path apps/ArkeyMac
      - run: ./scripts/build-macos-app.sh
      - run: codesign --verify --deep --strict --verbose=2 build/Arkey.app

  qmk-firmware:
    name: Q6 Pro standard + Micro Lab firmware
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi dfu-util
      - run: python -m pip install qmk
      - run: git clone --filter=blob:none --no-checkout https://github.com/Keychron/qmk_firmware.git "$RUNNER_TEMP/qmk_firmware"
      - run: git -C "$RUNNER_TEMP/qmk_firmware" checkout 618127a725a1773e85f13455602cf6f72ab4de17
      - run: git -C "$RUNNER_TEMP/qmk_firmware" submodule update --init --recursive --depth 1
      - run: python -m pip install -r "$RUNNER_TEMP/qmk_firmware/requirements.txt"
      - run: qmk config user.qmk_home="$RUNNER_TEMP/qmk_firmware"
      - run: QMK_HOME="$RUNNER_TEMP/qmk_firmware" ./scripts/build-q6-pro.sh
      - run: sha256sum build/arkey-q6-pro-ansi-v0.1.0.bin
      - name: Verify standard build restored upstream files
        run: test -z "$(git -C "$RUNNER_TEMP/qmk_firmware" status --short --untracked-files=no)"
      - name: Compile development-only Codex Micro Lab source
        run: >-
          QMK_HOME="$RUNNER_TEMP/qmk_firmware"
          ./scripts/build-codex-micro-lab-q6-pro.sh
          --acknowledge-device-identity-test
      - run: sha256sum build/arkey-q6-pro-codex-micro-lab-v0.1.4.bin
      - name: Verify Lab build restored upstream files
        run: test -z "$(git -C "$RUNNER_TEMP/qmk_firmware" status --short --untracked-files=no)"
